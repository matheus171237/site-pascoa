<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Páscoa Premium 🐰</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(135deg, #fff1e6, #ffe5ec);
}

/* HEADER */
header {
  background: linear-gradient(135deg, #ff4d6d, #ff758f);
  color: white;
  text-align: center;
  padding: 40px 20px;
}

header h1 {
  font-size: 2.5em;
}

header p {
  margin-top: 10px;
}

/* GRID */
#produtos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  padding: 30px;
  gap: 20px;
}

/* CARD */
.produto {
  background: white;
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.produto:hover {
  transform: translateY(-8px);
}

/* IMAGEM */
.produto img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

/* TEXTO */
.produto h3 {
  margin: 10px 0;
}

.preco {
  color: green;
  font-size: 20px;
  font-weight: bold;
}

/* TAG */
.tag {
  background: gold;
  padding: 5px;
  font-size: 12px;
  border-radius: 5px;
  display: inline-block;
  margin-bottom: 8px;
}

/* BOTÃO */
button {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #25D366;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #1ebe5d;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #555;
}
</style>

</head>

<body>

<header>
  <h1>🐰 Ovos de Páscoa</h1>
  <p>Promoções imperdíveis 🍫</p>
</header>

<section id="produtos"></section>

<footer>
  <p>© 2026 - Sua Loja</p>
</footer>

<script>
const produtos = [
  {
    nome: "Ovo Chocolate ao Leite 200g",
    preco: 29.90,
    imagem: "https://source.unsplash.com/300x300/?chocolate",
    destaque: "MAIS VENDIDO"
  },
  {
    nome: "Ovo Recheado Brigadeiro 300g",
    preco: 39.90,
    imagem: "https://source.unsplash.com/300x300/?easter-egg",
    destaque: "TOP"
  },
  {
    nome: "Ovo Crocante 250g",
    preco: 34.90,
    imagem: "https://source.unsplash.com/300x300/?candy",
    destaque: "PROMOÇÃO"
  },
  {
    nome: "Ovo Cookies 250g",
    preco: 32.90,
    imagem: "https://source.unsplash.com/300x300/?dessert",
    destaque: "OFERTA"
  }
];

const container = document.getElementById("produtos");

produtos.forEach(produto => {
  const div = document.createElement("div");
  div.classList.add("produto");

  div.innerHTML = `
    <div class="tag">${produto.destaque}</div>
    <img src="${produto.imagem}">
    <h3>${produto.nome}</h3>
    <p class="preco">R$ ${produto.preco.toFixed(2)}</p>
    <button onclick="comprar('${produto.nome}')">Comprar no WhatsApp</button>
  `;

  container.appendChild(div);
});

function comprar(nome) {
  const numero = "5561999998888"; // 🔴 COLOQUE SEU NÚMERO
  const mensagem = "Olá! Quero comprar: " + nome;

  const link = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem);
  window.open(link, "_blank");
}
</script>

</body>
</html>
