<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Páscoa Premium 🐰</title>
<style>
/* RESET E TIPOGRAFIA */
* {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif;}
body {background: linear-gradient(135deg, #fff1e6, #ffe5ec); color:#333;}

/* CABEÇALHO */
header {
  background: linear-gradient(135deg, #ff4d6d, #ff758f);
  color:white;
  padding:20px 30px;
  display:flex;
  justify-content: space-between;
  align-items:center;
  flex-wrap: wrap;
}

header h1 {font-size:2em;}
nav a {
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
  transition:0.3s;
}
nav a:hover {color:#ffddcc;}

/* BANNER */
.banner {
  background: url('https://source.unsplash.com/1200x400/?easter,chocolate') no-repeat center/cover;
  height:400px;
  border-radius:15px;
  margin:20px 30px;
  display:flex;
  flex-direction: column;
  justify-content:center;
  align-items:center;
  color:white;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
  animation: bannerFade 2s ease;
}
@keyframes bannerFade {
  from {opacity:0; transform: scale(0.95);}
  to {opacity:1; transform: scale(1);}
}
.banner h2 {font-size:2.5em; margin-bottom:10px;}
.banner p {font-size:1.2em;}

/* PRODUTOS */
#produtos {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap:25px;
  padding:30px;
  margin:0 30px;
}

.produto {
  background:white;
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transition:0.3s;
}
.produto:hover {transform: translateY(-10px) scale(1.03);}
.produto img {width:100%; height:200px; object-fit:cover; border-radius:10px;}
.produto h3 {margin:10px 0;}
.preco {color:#2ecc71; font-size:20px; font-weight:bold;}
.tag {background: gold; padding:5px 8px; font-size:12px; border-radius:5px; display:inline-block; margin-bottom:8px;}

/* BOTÃO WHATSAPP */
button {
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#25D366;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
button:hover {background:#1ebe5d;}

/* RODAPÉ */
footer {
  background:#ff4d6d;
  color:white;
  text-align:center;
  padding:30px;
  margin-top:40px;
}
footer a {color:white; margin:0 10px; transition:0.3s;}
footer a:hover {color:#ffddcc;}

/* RESPONSIVO */
@media(max-width:768px){
  header {flex-direction:column; text-align:center;}
  nav {margin-top:10px;}
  .banner {height:300px; margin:20px;}
  #produtos {margin:0 15px; gap:15px;}
}
</style>
</head>

<body>

<header>
  <h1>🐰 Páscoa Premium</h1>
  <nav>
    <a href="#produtos">Produtos</a>
    <a href="#contato">Contato</a>
  </nav>
</header>

<section class="banner">
  <h2>Ovos de Páscoa em Promoção</h2>
  <p>Os mais vendidos com preços acessíveis! 🍫</p>
</section>

<section id="produtos"></section>

<footer id="contato">
  <p>© 2026 - Sua Loja de Páscoa</p>
  <p>Redes sociais:</p>
  <a href="https://instagram.com" target="_blank">Instagram</a>|
  <a href="https://facebook.com" target="_blank">Facebook</a>|
  <a href="https://wa.me/5561999998888" target="_blank">WhatsApp</a>
</footer>

<script>
const produtos = [
  {nome:"Ovo Chocolate ao Leite 200g", preco:29.90, imagem:"https://source.unsplash.com/300x300/?chocolate", destaque:"MAIS VENDIDO"},
  {nome:"Ovo Recheado Brigadeiro 300g", preco:39.90, imagem:"https://source.unsplash.com/300x300/?easter-egg", destaque:"TOP"},
  {nome:"Ovo Crocante 250g", preco:34.90, imagem:"https://source.unsplash.com/300x300/?candy", destaque:"PROMOÇÃO"},
  {nome:"Ovo Cookies 250g", preco:32.90, imagem:"https://source.unsplash.com/300x300/?dessert", destaque:"OFERTA"}
];

const container = document.getElementById("produtos");

produtos.forEach(produto => {
  const div = document.createElement("div");
  div.classList.add("produto");
  div.innerHTML = `
    <div class="tag">${produto.destaque}</div>
    <img src="${produto.imagem}">
    <h3>${produto.nome}</h3>
    <p class="preco">R$ ${produto.preco.toFixed(2)}</p>
    <button onclick="comprar('${produto.nome}')">Comprar no WhatsApp</button>
  `;
  container.appendChild(div);
});

function comprar(nome){
  const numero = "5561981370688"; // TROQUE PELO SEU NÚMERO
  const mensagem = "Olá! Quero comprar: " + nome;
  const link = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem);
  window.open(link,"_blank");
}
</script>

</body>
</html>
