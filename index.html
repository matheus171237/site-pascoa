
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Páscoa Premium 🐰</title>
<style>
/* RESET E TIPOGRAFIA */
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background: linear-gradient(135deg, #fff5f0, #ffe5ec); color:#333;}

/* CABEÇALHO FIXO */
header {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  background: rgba(255,77,109,0.95);
  padding:20px 40px;
  display:flex;
  justify-content: space-between;
  align-items:center;
  z-index:1000;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:0.3s;
}
header h1 {color:white; font-size:2em;}
nav a {color:white; text-decoration:none; margin-left:25px; font-weight:bold; transition:0.3s;}
nav a:hover {color:#ffe5ec;}

/* BANNER COM PARALLAX */
.banner {
  background: url('https://source.unsplash.com/1600x500/?easter,chocolate') center/cover no-repeat;
  height:500px;
  margin-top:80px;
  display:flex;
  flex-direction: column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
  transition: transform 0.5s ease;
}
.banner h2 {font-size:3em; margin-bottom:10px; animation:fadeInDown 1s ease;}
.banner p {font-size:1.3em; animation:fadeInUp 1s ease;}

@keyframes fadeInDown {from {opacity:0; transform:translateY(-30px);} to {opacity:1; transform:translateY(0);}}
@keyframes fadeInUp {from {opacity:0; transform:translateY(30px);} to {opacity:1; transform:translateY(0);}}

/* PRODUTOS EM CARTÕES */
#produtos {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap:25px;
  padding:50px 40px;
}

.produto {
  background:white;
  border-radius:20px;
  padding:20px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
  transition: transform 0.3s, box-shadow 0.3s;
  cursor:pointer;
}
.produto:hover {
  transform: translateY(-15px) scale(1.05);
  box-shadow:0 30px 50px rgba(0,0,0,0.2);
}
.produto img {
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:15px;
  margin-bottom:15px;
}
.produto h3 {margin:10px 0;}
.preco {color:#2ecc71; font-size:20px; font-weight:bold;}
.tag {background: gold; padding:5px 10px; font-size:12px; border-radius:5px; display:inline-block; margin-bottom:10px; font-weight:bold;}

/* BOTÃO WHATSAPP COM ANIMAÇÃO */
button {
  margin-top:10px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#25D366;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 6px 12px rgba(0,0,0,0.2);
}
button:hover {
  background:#1ebe5d;
  transform: scale(1.05);
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* RODAPÉ ESTILOS */
footer {
  background:#ff4d6d;
  color:white;
  text-align:center;
  padding:40px 20px;
  margin-top:50px;
}
footer a {color:white; margin:0 12px; transition:0.3s; text-decoration:none;}
footer a:hover {color:#ffe5ec; text-decoration:underline;}

/* RESPONSIVO */
@media(max-width:768px){
  header {flex-direction:column; text-align:center;}
  nav {margin-top:10px;}
  .banner {height:300px;}
  #produtos {padding:30px 15px; gap:15px;}
}

/* BOTÃO FIXO WHATSAPP */
#whats {
  position:fixed;
  bottom:30px;
  right:30px;
  background:#25D366;
  color:white;
  border-radius:50%;
  width:60px;
  height:60px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  box-shadow:0 8px 16px rgba(0,0,0,0.3);
  cursor:pointer;
  transition:0.3s;
}
#whats:hover {transform: scale(1.1); box-shadow:0 12px 20px rgba(0,0,0,0.4);}
</style>
</head>

<body>

<header>
  <h1>🐰 Páscoa Premium</h1>
  <nav>
    <a href="#produtos">Produtos</a>
    <a href="#contato">Contato</a>
  </nav>
</header>

<section class="banner">
  <h2>Ovos de Páscoa Exclusivos</h2>
  <p>Os mais vendidos com preços acessíveis! 🍫</p>
</section>

<section id="produtos"></section>

<footer id="contato">
  <p>© 2026 - Sua Loja de Páscoa</p>
  <p>Redes sociais:</p>
  <a href="https://instagram.com" target="_blank">Instagram</a>|
  <a href="https://facebook.com" target="_blank">Facebook</a>|
  <a href="https://wa.me/5561999998888" target="_blank">WhatsApp</a>
</footer>

<!-- BOTÃO FIXO WHATSAPP -->
<div id="whats" onclick="abrirWhats()">💬</div>

<script>
const produtos = [
  {nome:"Ovo Chocolate ao Leite 200g", preco:29.90, imagem:"https://source.unsplash.com/300x300/?chocolate", destaque:"MAIS VENDIDO"},
  {nome:"Ovo Recheado Brigadeiro 300g", preco:39.90, imagem:"https://source.unsplash.com/300x300/?easter-egg", destaque:"TOP"},
  {nome:"Ovo Crocante 250g", preco:34.90, imagem:"https://source.unsplash.com/300x300/?candy", destaque:"PROMOÇÃO"},
  {nome:"Ovo Cookies 250g", preco:32.90, imagem:"https://source.unsplash.com/300x300/?dessert", destaque:"OFERTA"}
];

const container = document.getElementById("produtos");

produtos.forEach(produto => {
  const div = document.createElement("div");
  div.classList.add("produto");
  div.innerHTML = `
    <div class="tag">${produto.destaque}</div>
    <img src="${produto.imagem}">
    <h3>${produto.nome}</h3>
    <p class="preco">R$ ${produto.preco.toFixed(2)}</p>
    <button onclick="comprar('${produto.nome}')">Comprar no WhatsApp</button>
  `;
  container.appendChild(div);
});

function comprar(nome){
  const numero = "5561999998888"; // TROQUE PELO SEU NÚMERO
  const mensagem = "Olá! Quero comprar: " + nome;
  const link = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem);
  window.open(link,"_blank");
}

function abrirWhats(){
  const numero = "5561999998888"; // TROQUE PELO SEU NÚMERO
  window.open("https://wa.me/" + numero,"_blank");
}
</script>

</body>
</html>
